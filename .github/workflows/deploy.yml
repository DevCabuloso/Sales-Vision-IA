name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN
          script: |
            cd /opt/sdr-platform

            echo ">>> Atualizando código..."
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/DevCabuloso/Plataforma-SDR.git
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Instalando dependências do backend..."
            cd backend && npm install && cd ..

            echo ">>> Instalando dependências do frontend..."
            cd frontend
            # Garante que o .env existe (git reset --hard não afeta arquivos gitignored,
            # mas recria caso o servidor seja novo ou a pasta seja limpa manualmente)
            if [ ! -f .env ]; then
              echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
              echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
              echo "VITE_API_BASE=/api" >> .env
              echo "VITE_BACKEND_URL=http://167.233.84.42" >> .env
              echo ">>> .env do frontend recriado"
            fi
            npm install && npm run build
            cd ..

            echo ">>> Reiniciando backend..."
            pm2 describe backend > /dev/null 2>&1 \
              && pm2 restart backend --update-env \
              || pm2 start /opt/sdr-platform/backend/src/server.js \
                   --name backend \
                   --interpreter node \
                   --cwd /opt/sdr-platform/backend \
                   --env production

            sleep 3
            pm2 status backend

            echo ">>> Reload do Nginx..."
            systemctl reload nginx

            echo ">>> Deploy concluído!"
